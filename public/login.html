<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSSH</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      background: #161b22;
      padding: 40px;
      border-radius: 12px;
      border: 1px solid #30363d;
      width: 100%;
      max-width: 360px;
    }
    .lang-switch {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 16px;
    }
    .lang-btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .lang-btn:hover { background: #30363d; color: #e6edf3; }
    .lang-btn.active { background: #58a6ff; color: #fff; border-color: #58a6ff; }
    h1 { text-align: center; margin-bottom: 24px; font-size: 24px; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; }
    h1:hover { opacity: 0.8; }
    h1 svg { width: 32px; height: 32px; fill: #58a6ff; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-size: 14px; color: #8b949e; }
    input {
      width: 100%;
      padding: 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 15px;
    }
    input:focus { outline: none; border-color: #58a6ff; }
    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 12px 0;
      cursor: pointer;
      font-size: 14px;
      color: #8b949e;
    }
    .checkbox input { width: 18px; height: 18px; }
    .btn {
      width: 100%;
      padding: 12px;
      background: #6BA4F8;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { background: #5B94E8; }
    .error {
      background: rgba(248, 81, 73, 0.1);
      color: #f85149;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
    .error.show { display: block; }
    .links {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      color: #8b949e;
    }
    .links a { color: #58a6ff; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal.show { display: flex; }
    .modal-box {
      background: #161b22;
      padding: 32px;
      border-radius: 12px;
      border: 1px solid #30363d;
      text-align: center;
      max-width: 320px;
    }
    .modal-box h2 { margin-bottom: 16px; font-size: 18px; }
    .modal-box p { font-size: 14px; color: #8b949e; margin-bottom: 16px; }
    .modal-box img { border-radius: 8px; margin-bottom: 16px; }
    .modal-box input {
      text-align: center;
      font-size: 20px;
      letter-spacing: 4px;
      margin-bottom: 16px;
    }
    .modal-box .error {
      background: rgba(248, 81, 73, 0.15);
      margin: -32px -32px 16px -32px;
      border-radius: 12px 12px 0 0;
      padding: 16px;
    }
    .username-status { font-size: 12px; margin-top: 4px; min-height: 16px; }
    .username-status.ok { color: #3fb950; }
    .username-status.error { color: #f85149; }
    .username-status.loading { color: #8b949e; }
  </style>
</head>
<body>
  <div class="box">
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ru">RU</button>
    </div>
    <h1 onclick="window.location.href='/'">
      <svg viewBox="0 0 24 24"><path d="M21 2H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7l-2 3v1h8v-1l-2-3h7c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-9 15c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"></path></svg>
      WebSSH
    </h1>
    <div class="error" id="error"></div>
    
    <form id="login-form">
      <div class="form-group">
        <label data-i18n="username">Username</label>
        <input type="text" name="username" required>
      </div>
      <div class="form-group">
        <label data-i18n="password">Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn" data-i18n="signIn">Sign In</button>
    </form>
    
    <form id="register-form" style="display:none;">
      <div class="form-group">
        <label data-i18n="username">Username</label>
        <input type="text" name="username" id="reg-username" required>
        <div class="username-status" id="username-status"></div>
      </div>
      <div class="form-group">
        <label data-i18n="password">Password</label>
        <input type="password" name="password" required minlength="6">
      </div>
      <label class="checkbox">
        <input type="checkbox" name="enable2fa">
        <span data-i18n="enable2FA">Enable 2FA (Google Authenticator / Yandex Key)</span>
      </label>
      <button type="submit" class="btn" data-i18n="createAccount">Create Account</button>
    </form>
    
    <div class="links">
      <span id="login-text"><span data-i18n="noAccount">Don't have an account?</span> <a href="#" id="show-register" data-i18n="signUp">Sign Up</a></span>
      <span id="register-text" style="display:none;"><span data-i18n="haveAccount">Already have an account?</span> <a href="#" id="show-login" data-i18n="signInLink">Sign In</a></span>
    </div>
  </div>

  <div class="modal" id="login-2fa-modal">
    <div class="modal-box">
      <h2 data-i18n="twoFactor">Two-Factor Authentication</h2>
      <div class="error" id="login-2fa-error" style="display:none;"></div>
      <p data-i18n="enterCode">Enter code from your authenticator app</p>
      <input type="text" id="login-2fa-code" maxlength="6" placeholder="000000" autocomplete="off">
      <button class="btn" id="login-verify-btn" data-i18n="verify">Verify</button>
    </div>
  </div>

  <div class="modal" id="register-2fa-modal">
    <div class="modal-box">
      <h2 data-i18n="setup2FA">Setup 2FA</h2>
      <div class="error" id="register-2fa-error" style="display:none;"></div>
      <p data-i18n="scanQR">Scan QR code with Google Authenticator or Yandex Key</p>
      <img id="register-qr" alt="QR">
      <input type="text" id="register-2fa-code" maxlength="6" placeholder="000000" autocomplete="off">
      <button class="btn" id="register-verify-btn" data-i18n="verifyCreate">Verify & Create</button>
    </div>
  </div>

  <script>
    const i18n = {
      en: {
        username: 'Username',
        password: 'Password',
        signIn: 'Sign In',
        createAccount: 'Create Account',
        noAccount: "Don't have an account?",
        haveAccount: 'Already have an account?',
        signUp: 'Sign Up',
        signInLink: 'Sign In',
        twoFactor: 'Two-Factor Authentication',
        enterCode: 'Enter code from your authenticator app',
        verify: 'Verify',
        setup2FA: 'Setup 2FA',
        scanQR: 'Scan QR code with Google Authenticator or Yandex Key',
        verifyCreate: 'Verify & Create',
        enable2FA: 'Enable 2FA (Google Authenticator / Yandex Key)',
        loginFailed: 'Login failed',
        registrationFailed: 'Registration failed',
        invalidCode: 'Invalid code',
        enterCodeError: 'Enter 6-digit code',
        connectionError: 'Connection error',
        usernameTaken: 'Username is already taken',
        usernameAvailable: 'Username is available',
        checking: 'Checking...',
        passwordMin: 'Password must be at least 6 characters',
        fillAll: 'Fill all fields'
      },
      ru: {
        username: 'Имя пользователя',
        password: 'Пароль',
        signIn: 'Войти',
        createAccount: 'Создать аккаунт',
        noAccount: 'Нет аккаунта?',
        haveAccount: 'Уже есть аккаунт?',
        signUp: 'Регистрация',
        signInLink: 'Войти',
        twoFactor: 'Двухфакторная аутентификация',
        enterCode: 'Введите код из приложения',
        verify: 'Подтвердить',
        setup2FA: 'Настройка 2FA',
        scanQR: 'Отсканируйте QR код приложением Google Authenticator или Яндекс Ключ',
        verifyCreate: 'Подтвердить и создать',
        enable2FA: 'Включить 2FA (Google Authenticator / Яндекс Ключ)',
        loginFailed: 'Ошибка входа',
        registrationFailed: 'Ошибка регистрации',
        invalidCode: 'Неверный код',
        enterCodeError: 'Введите 6-значный код',
        connectionError: 'Ошибка соединения',
        usernameTaken: 'Имя пользователя занято',
        usernameAvailable: 'Имя пользователя свободно',
        checking: 'Проверка...',
        passwordMin: 'Пароль минимум 6 символов',
        fillAll: 'Заполните все поля'
      }
    };

    let currentLang = localStorage.getItem('lang') || 'en';

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[lang][key]) el.textContent = i18n[lang][key];
      });
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.onclick = () => setLanguage(btn.dataset.lang);
    });

    setLanguage(currentLang);

    const $ = id => document.getElementById(id);
    const error = $('error');
    let loginChallenge = null;
    let pendingData = null;
    let pendingSecret = null;
    let usernameTimeout = null;
    let usernameAvailable = false;

    function t(key) { return i18n[currentLang][key] || key; }

    function showError(msg) {
      error.textContent = msg;
      error.classList.add('show');
    }

    function hideError() { error.classList.remove('show'); }

    function showLogin() {
      $('login-form').style.display = 'block';
      $('register-form').style.display = 'none';
      $('login-text').style.display = 'inline';
      $('register-text').style.display = 'none';
      hideError();
    }

    function showRegister() {
      $('login-form').style.display = 'none';
      $('register-form').style.display = 'block';
      $('login-text').style.display = 'none';
      $('register-text').style.display = 'inline';
      hideError();
    }

    $('show-register').onclick = e => { e.preventDefault(); showRegister(); };
    $('show-login').onclick = e => { e.preventDefault(); showLogin(); };

    const statusEl = $('username-status');
    const usernameInput = $('reg-username');

    usernameInput.oninput = () => {
      clearTimeout(usernameTimeout);
      if (!usernameInput.value) {
        statusEl.textContent = '';
        statusEl.className = 'username-status';
        usernameAvailable = false;
        return;
      }
      statusEl.textContent = t('checking');
      statusEl.className = 'username-status loading';
      usernameTimeout = setTimeout(async () => {
        try {
          const res = await fetch('/api/check-username', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: usernameInput.value })
          });
          const data = await res.json();
          if (data.available) {
            statusEl.textContent = t('usernameAvailable');
            statusEl.className = 'username-status ok';
            usernameAvailable = true;
          } else {
            statusEl.textContent = t('usernameTaken');
            statusEl.className = 'username-status error';
            usernameAvailable = false;
          }
        } catch {
          statusEl.textContent = '';
          usernameAvailable = false;
        }
      }, 300);
    };

    $('login-form').onsubmit = async e => {
      e.preventDefault();
      hideError();
      const username = e.target.username.value;
      const password = e.target.password.value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || t('loginFailed'));
          return;
        }

        if (data.requires2fa) {
          loginChallenge = data.challenge;
          $('login-2fa-modal').classList.add('show');
          $('login-2fa-code').value = '';
          $('login-2fa-error').style.display = 'none';
          $('login-2fa-code').focus();
          return;
        }

        window.location.href = '/connect';
      } catch {
        showError(t('connectionError'));
      }
    };

    $('login-verify-btn').onclick = async () => {
      const code = $('login-2fa-code').value;
      if (code.length !== 6) {
        $('login-2fa-error').textContent = t('enterCodeError');
        $('login-2fa-error').style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/login-2fa', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ challenge: loginChallenge, code })
        });

        if (!res.ok) {
          const data = await res.json();
          $('login-2fa-error').textContent = data.error || t('invalidCode');
          $('login-2fa-error').style.display = 'block';
          return;
        }

        window.location.href = '/connect';
      } catch {
        $('login-2fa-error').textContent = t('connectionError');
        $('login-2fa-error').style.display = 'block';
      }
    };

    $('login-2fa-code').oninput = e => {
      if (e.target.value.length === 6) $('login-verify-btn').click();
    };

    $('register-form').onsubmit = async e => {
      e.preventDefault();
      hideError();
      const username = e.target.username.value;
      const password = e.target.password.value;
      const enable2fa = e.target.enable2fa.checked;

      if (!usernameAvailable) {
        showError(t('usernameTaken'));
        return;
      }

      try {
        if (enable2fa) {
          const setupRes = await fetch('/api/setup-2fa', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username })
          });
          const setupData = await setupRes.json();

          if (!setupRes.ok) {
            showError(setupData.error || t('registrationFailed'));
            return;
          }

          pendingData = { username, password };
          pendingSecret = setupData.secret;
          $('register-qr').src = setupData.qrCode;
          $('register-2fa-modal').classList.add('show');
          $('register-2fa-code').value = '';
          $('register-2fa-error').style.display = 'none';
          $('register-2fa-code').focus();
        } else {
          const res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          const data = await res.json();

          if (!res.ok) {
            showError(data.error || t('registrationFailed'));
            return;
          }

          window.location.href = '/connect';
        }
      } catch {
        showError(t('connectionError'));
      }
    };

    $('register-verify-btn').onclick = async () => {
      const code = $('register-2fa-code').value;
      if (code.length !== 6) {
        $('register-2fa-error').textContent = t('enterCodeError');
        $('register-2fa-error').style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/register-with-2fa', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: pendingData.username,
            password: pendingData.password,
            code,
            secret: pendingSecret
          })
        });

        if (!res.ok) {
          const data = await res.json();
          $('register-2fa-error').textContent = data.error || t('registrationFailed');
          $('register-2fa-error').style.display = 'block';
          return;
        }

        window.location.href = '/connect';
      } catch {
        $('register-2fa-error').textContent = t('connectionError');
        $('register-2fa-error').style.display = 'block';
      }
    };

    $('register-2fa-code').oninput = e => {
      if (e.target.value.length === 6) $('register-verify-btn').click();
    };
    
    // Check if already logged in
  </script>
</body>
</html>
